<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中干竞聘投票满屏后台</title>
<style>
html, body {
  margin:0; padding:0;
  width:100%; height:100%;
  font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background:#f0f4f8;
  overflow:hidden;
}

header {
  text-align:center;
  padding:10px;
  background:#1e3a8a;
  color:white;
  font-size:3vh; /* 标题字号随屏幕高度 */
}

#manualInput {
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
  margin:5px 0;
  flex-wrap:wrap;
  font-size:2vh;
}
#manualInput input { width:80px; padding:5px; font-size:2vh; }
#manualInput button { padding:5px 10px; font-size:2vh; border-radius:4px; border:none; background:#16a34a; color:white; cursor:pointer; }
#manualInput button:hover { background:#15803d; }

#summary { text-align:center; font-size:2.5vh; margin-bottom:5px; }

#results {
  display:grid;
  grid-template-columns: repeat(5, 1fr);
  grid-template-rows: repeat(3, 1fr);
  gap: 10px;
  height: calc(100% - 150px);
  padding:5px;
}

/* 每个岗位组 */
.candidate-group {
  background:#fff;
  border-radius:8px;
  padding:5px;
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
  height:100%;
  box-shadow:0 1px 4px rgba(0,0,0,0.1);
}

/* 岗位标题 */
.group-title {
  text-align:center;
  font-weight:bold;
  font-size:2.5vh; /* 标题随屏幕高度自适应 */
  margin-bottom:5px;
  color:#1e3a8a;
}

/* 候选人卡片 */
.candidate-card {
  background:#e8f0fe;
  border-radius:6px;
  margin-bottom:4px;
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  height: calc((100% - 3vh)/3); /* 每个岗位内均分高度 */
  box-sizing:border-box;
  font-size:2.5vh; /* 字号随屏幕高度 */
}

.candidate-stats {
  display:flex;
  gap:5px;
  margin-top:2px;
  font-size:2vh; /* 投票数与百分比随屏幕自适应 */
}
.candidate-stats .votes{}
.candidate-stats .rate{ font-weight:bold; padding:2px 6px; border-radius:4px; color:white; }
.rate.green{ background:#16a34a; }
.rate.red{ background:#dc2626; }

/* 登录遮罩 */
#loginOverlay {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background: rgba(0,0,0,0.85);
  display:flex; justify-content:center; align-items:center;
  z-index:9999;
}
.login-box{
  background:white; padding:30px; border-radius:12px; width:300px; text-align:center;
}
.login-box h2{ margin-bottom:20px; }
.login-box input{ width:100%; padding:12px; margin-bottom:15px; border-radius:6px; border:1px solid #ccc; font-size:16px; }
.login-box button{ width:100%; padding:12px; border:none; border-radius:6px; background:#2563eb; color:white; font-size:16px; cursor:pointer; }
.login-box button:hover{ background:#1e40af; }
</style>
</head>
<body>

<div id="loginOverlay">
  <div class="login-box">
    <h2>后台登录</h2>
    <input type="password" id="adminPassword" placeholder="请输入后台密码">
    <button onclick="login()">登录</button>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<header>中干竞聘投票满屏后台</header>

<div id="manualInput">
  <label>手动输入参与人数：</label>
  <input type="number" id="manualVoterInput" min="0">
  <button id="confirmVoterBtn">确认</button>
  <span id="manualInfo"></span>
  <button id="resetBtn">复位投票</button>
  <button id="refreshBtn">刷新数据</button>
  <button id="exportExcelBtn">导出 Excel</button>
</div>

<div id="summary">
  总参与人数：<span id="totalVoters">0</span>
</div>

<div id="results"></div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
// 初始化 Supabase
const supabaseUrl='https://bhilewmilbhxowxwwyfq.supabase.co';
const supabaseKey='sb_publishable_Qnzwloea8NOgqdtkhDVUEw_g_iIPMcD';
const db = supabase.createClient(supabaseUrl,supabaseKey);
const ADMIN_PASSWORD='123456';

const resultsDiv=document.getElementById('results');
const totalVotersSpan=document.getElementById('totalVoters');
const refreshBtn=document.getElementById('refreshBtn');
const resetBtn=document.getElementById('resetBtn');
const manualInput=document.getElementById('manualVoterInput');
const manualInfo=document.getElementById('manualInfo');
const confirmVoterBtn=document.getElementById('confirmVoterBtn');

function login(){
  const password=document.getElementById('adminPassword').value;
  if(password===ADMIN_PASSWORD){
    document.getElementById('loginOverlay').style.display='none';
    loadResults();
  }else{alert('密码错误');}
}

refreshBtn.addEventListener('click', loadResults);

confirmVoterBtn.addEventListener('click', ()=>{
  const val=Number(manualInput.value);
  if(val>0){
    const actualVoters=Number(totalVotersSpan.textContent);
    const rate=Math.min(100,(actualVoters/val*100).toFixed(1));
    manualInfo.textContent=`实际投票人数：${actualVoters}，参与率：${rate}%`;
  }else{manualInfo.textContent='';}
});


async function loadResults(){
  resultsDiv.innerHTML='';
  const {data:voterData}=await db.from('votes').select('user_code');
  const uniqueUsers=[...new Set(voterData.map(v=>v.user_code))];
  totalVotersSpan.textContent=uniqueUsers.length;

  const {data:candidates}=await db.from('candidates').select('*');

  const groups={};
  for(const c of candidates){
    if(!groups[c.position]) groups[c.position]=[];
    groups[c.position].push(c);
  }

  for(const pos in groups){
    const groupDiv=document.createElement('div');
    groupDiv.className='candidate-group';
    groupDiv.innerHTML=`<div class="group-title">${pos}</div>`;

    for(const c of groups[pos]){
      const {data:votes}=await db.from('votes').select('*').eq('candidate_id',Number(c.id));
      const voteCount=votes?votes.length:0;
      const rate=uniqueUsers.length>0?Math.round(voteCount/uniqueUsers.length*100):0;

      const card=document.createElement('div');
      card.className='candidate-card';
      card.innerHTML=`
        <div class="candidate-info">
          <div class="name">${c.name}</div>
        </div>
        <div class="candidate-stats">
          <div class="votes">${voteCount}票</div>
          <div class="rate ${rate>=50?'green':'red'}">${rate}%</div>
        </div>
      `;
      groupDiv.appendChild(card);
    }
    resultsDiv.appendChild(groupDiv);
  }
}

const exportExcelBtn = document.getElementById('exportExcelBtn');

exportExcelBtn.addEventListener('click', async ()=>{
  const {data:candidates} = await db.from('candidates').select('*');
  const {data:voterData} = await db.from('votes').select('candidate_id,user_code');

  const uniqueUsers=[...new Set(voterData.map(v=>v.user_code))];
  const totalVoters = uniqueUsers.length;

  const groups = {};
  for(const c of candidates){
    if(!groups[c.position]) groups[c.position] = [];
    groups[c.position].push(c);
  }

  const sheetData = [];
  for(const pos in groups){
    for(const c of groups[pos]){
      const voteCount = voterData.filter(v=>v.candidate_id === c.id).length;
      const rate = totalVoters>0 ? Math.round(voteCount/totalVoters*100) : 0;
      sheetData.push({
        '岗位': pos,
        '候选人': c.name,
        '票数': voteCount,
        '得票率(%)': rate
      });
    }
  }

  // 生成 Excel
  const ws = XLSX.utils.json_to_sheet(sheetData);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '投票统计');
  XLSX.writeFile(wb, '投票统计.xlsx');
});

window.addEventListener('DOMContentLoaded',()=>{document.getElementById('loginOverlay').style.display='flex';});
</script>
</body>
</html>
